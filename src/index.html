<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ImgRalph — Détourage avec animation</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.23.0/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@bunnio/rembg-web@latest/dist/index.umd.min.js"></script>
</head>
<body>
  <div class="voile" id="voile">
    <div class="voile-content">
      <div class="voile-text">Déposez une image</div>
    </div>
  </div>

  <!-- Fullscreen progress overlay -->
    <div class="fullscreen-progress" id="fullscreenProgress">
      <div class="fullscreen-progress-bar" id="fullscreenProgressBar"></div>
      <div class="fullscreen-progress-content">
        <div class="fullscreen-result">
          <img id="fullscreenResultImg" alt="" />
        </div>
        <div class="fullscreen-progress-percent" id="fullscreenProgressPercent" role="button" tabindex="0">0%</div>
        <div class="status" id="status" role="status" aria-live="polite"></div>
        <div class="download-controls" id="downloadControls" hidden>
          <label class="tol-control" for="engineSelect">
            <span class="tol-label">Source</span>
            <select id="engineSelect">
            <option value="api" selected>remove.bg (API)</option>
            <option value="local">Local (navigateur)</option>
          </select>
          <span class="tol-value" aria-hidden="true"></span>
        </label>
        <label class="tol-control" for="modelSelect">
          <span class="tol-label">Modèle</span>
          <select id="modelSelect">
            <option value="u2net" selected>u2net (qualité)</option>
            <option value="u2netp">u2netp (rapide)</option>
            <option value="u2net_human_seg">u2net_human_seg (humain)</option>
          </select>
          <span class="tol-value" aria-hidden="true"></span>
        </label>
        <label class="tol-control" for="toleranceRange">
          <span class="tol-label">Détourage</span>
          <input id="toleranceRange" type="range" min="-50" max="200" step="1" value="80" />
          <span class="tol-value" id="toleranceValue" aria-hidden="true">80</span>
        </label>
      </div>
    </div>
  </div>

  <main class="app">
    <section class="dropzone-area" id="dropzoneArea">
      <div id="dropzone" class="dropzone" role="button" tabindex="0">
        <span class="dropzone-text">Déposez une image</span>
        <input id="fileInput" type="file" accept="image/*" hidden />
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
