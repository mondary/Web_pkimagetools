<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PK Chrome Web Store — Asset Resizer</title>
  <link rel="stylesheet" href="resizer.css" />
</head>
<body>
  <header>
    <strong>PK Chrome Shortcuts · Asset Resizer</strong>
    <span class="hint">Charge une image, choisis un preset, zoome et déplace, exporte PNG/JPEG.</span>
  </header>
  <main>
    <section class="panel">
      <label>
        <span>Image source</span>
        <input id="file" type="file" accept="image/*" />
      </label>
      <div>
        <span class="hint">Formats Chrome Web Store (clique pour activer)</span>
        <div id="presets" class="presets"></div>
      </div>
      <div>
        <span class="hint">Taille cible: <strong id="sizeLabel"></strong></span>
      </div>
      <div class="row">
        <button id="fitW">Fit largeur</button>
        <button id="fitH">Fit hauteur</button>
        <button id="center">Centrer</button>
      </div>
      <label>
        <span>Zoom</span>
        <input id="zoom" type="range" min="0.2" max="3" step="0.01" value="1" />
        <div class="hint" id="zoomLabel">1.00×</div>
      </label>
      <label>
        <span>Couleur de fond (pas d'alpha sur PNG/JPEG Chrome Store)</span>
        <input id="bg" type="color" value="#0b1220" />
      </label>
      <label class="row" style="align-items:center; gap:8px;">
        <input id="magnet" type="checkbox" />
        <span class="hint">Magnétisme centre (snap si proche)</span>
      </label>
      <div class="row">
        <button id="reset">Réinitialiser vue</button>
        <button id="downloadPng" class="primary">Télécharger PNG</button>
      </div>
      <button id="downloadJpg">Télécharger JPEG</button>
      <p class="hint">Glisser pour déplacer l'image · Molette pour zoomer.</p>
    </section>

    <section class="canvas-wrap">
      <div class="drop-hint" id="dropHint">Dépose ton image ici</div>
      <canvas id="canvas" width="1280" height="800" aria-label="Zone d'aperçu"></canvas>
    </section>
  </main>

  <script src="resizer.js"></script>
</body>
</html>
